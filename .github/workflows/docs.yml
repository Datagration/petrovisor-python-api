name: Build and Deploy Documentation

on:
  push:
    branches: [ main ]
    paths:
      - 'petrovisor/**'               # Python package
      - 'docs/**'                     # Documentation source
      - 'website/**'                  # Website source
      - 'scripts/requirements-docs.txt'  # Documentation dependencies
      - '.github/workflows/docs.yml'  # This workflow file
  pull_request:
    branches: [ main ]
  # Allow manual triggering
  workflow_dispatch:

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .  # Install the Python package with Hatchling
          pip install -r scripts/requirements-docs.txt  # Install doc dependencies

      - name: Generate documentation
        run: |
          chmod +x scripts/generate_docs.sh
          scripts/generate_docs.sh

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'yarn'
          cache-dependency-path: 'website/yarn.lock'

      - name: Install website dependencies
        run: |
          cd website
          yarn install

      - name: Build website
        run: |
          cd website
          yarn build

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website/build
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'